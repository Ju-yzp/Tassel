---
# ── Tassel Foxglove environment config ────────────────────────────────────
# Copy this file and edit to match your setup, then set TASSEL_FOXGLOVE_ENV
# or pass it to load_env() / launch().
#
#   cp tassel_foxglove/env.yaml my_env.yaml   # edit, then:
#   TASSEL_FOXGLOVE_ENV=my_env.yaml python3 scripts/launch_foxglove.py ...
#
# Every key is optional — missing keys fall back to the defaults below.
# ──────────────────────────────────────────────────────────────────────────

foxglove:
  # Path to foxglove-studio.  "auto" = search PATH + common locations.
    studio_path: auto

    bridge:
        port: 8765
        address: 0.0.0.0
        tls: false
        use_compression: false

layout:
    default_grid_cols: 2
