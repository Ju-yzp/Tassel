---
# ── test_viewer Foxglobe panel layout ─────────────────────────────────────
# Matches topics published by tassel_tools/tests/test_viewer.cpp
#
# Published topics:
#   odom/camera     → nav_msgs/Odometry        (elliptical orbit pose)
#   image/camera    → sensor_msgs/Image         (synthetic sphere, BGR8)
#   landmarks       → sensor_msgs/PointCloud2    (single point at camera position)
#   error           → std_msgs/Float32          (distance from origin)
#
# To use:
#   1. ./build/tassel_tools/test_viewer
#   2. python3 scripts/launch_foxglove.py config/test_viewer.yaml
# ──────────────────────────────────────────────────────────────────────────

# ── Bridge settings ─────────────────────────────────────────────────────
bridge:
    port: 8765

# ── Grid layout ─────────────────────────────────────────────────────────
grid_cols: 3

# ── Panels ──────────────────────────────────────────────────────────────
panels:
  # ── synthetic image ────────────────────────────────────────────────
    - type: image
      name: camera_view
      topic: image/camera
      calibration_topic: ''
      sync_timestamps: false

  # ── 3-D trajectory (from Odometry + TF) ───────────────────────────
    - type: trajectory
      name: trajectory
      odom_topic: odom/camera
      frame: world

  # ── path history ──────────────────────────────────────────────────
    - type: path
      name: path
      topic: path/camera
      line_width: 0.05
      color: '#00ff88'

  # ── point cloud landmarks ───────────────────────────────────────────
    - type: pointcloud
      name: landmarks
      topic: landmarks
      point_size: 0.1

  # ── distance error plot ─────────────────────────────────────────────
    - type: error
      name: distance
      topic: error
      line_size: 2
      line_color: '#51b3ff'
