---
# ── Tassel stereo VINS configuration ─────────────────────────────────────

# ── stereo cameras ───────────────────────────────────────────────────────
cam0:
    camera_model: radtan
    T_cam_imu:
        - [0.9999683548573183, 0.0015969244801277659, -0.007793530403724961, 0.009659362163025145]
        - [0.0015859925567796474, -0.99999775013443, -0.0014086708942864844, 0.0010971307146912697]
        - [-0.007795762410364764, 0.0013962658354836992, -0.9999686377732845, -0.006894490579600325]
        - [0.0, 0.0, 0.0, 1.0]
    distortion_coeffs: [0.010831, -0.007841, 0.000166, 0.000512, 0.000000]
    intrinsics:
        - [455.510864, 0.000000, 328.529851]
        - [0.000000, 455.426715, 225.596721]
        - [0.0, 0.0, 1.0]

cam1:
    camera_model: radtan
    T_cam_imu:
        - [0.9999460143537426, 0.003210598991594255, -0.009882329289204057, -0.0660893601740808]
        - [0.003257607073719117, -0.999983439356287, 0.004744366061446668, 0.001064050791354557]
        - [-0.009866933374577004, -0.00477630267957609, -0.9999399134740523, -0.0066140157813651046]
        - [0.0, 0.0, 0.0, 1.0]
    distortion_coeffs: [0.028404, -0.022619, -0.000793, -0.002258, 0.000000]
    intrinsics:
        - [462.007162, 0.000000, 313.439176]
        - [0.000000, 461.452922, 229.403156]
        - [0.0, 0.0, 1.0]

# ── image / grid ──────────────────────────────────────────────────────────
rows: 480
cols: 640
per_grid_rows: 40
per_grid_cols: 60
edge_x: 15
edge_y: 15
mask_radius: 15.0
min_feature_num: 100

# ── optical flow ──────────────────────────────────────────────────────────
flow_back: true
max_square_move_dist: 0.8
min_gradient: 20.0
enable_statistics: true

# ── feature manager ───────────────────────────────────────────────────────
reprojection_error_thres: 0.96
parallax_thres: 30.0
max_pnp_needed_num: 25
tracked_times_thres: 3
min_pnp_num: 8
min_pnp_inliers_ratio: 0.85
min_depth: 0.1
max_depth: 3.0
min_translation: 0.10
min_tracked_pts_num: 20

# ── estimator ─────────────────────────────────────────────────────────────
use_imu: true
visual_sqrt_info: 340.0
num_iterations: 10
solve_time: 0.05
max_frame_count: 10
spand_time: 1.0
repropagate_ba_thres: 0.05
repropagate_bg_thres: 0.01
num_threads: 4
# ── VO estimator ──────────────────────────────────────────────────────────
optimize_enabled: true
marginalization_enabled: true
lambda_initial: 1.0e-3

# ── IMU noise ─────────────────────────────────────────────────────────────
acc_n: 1.9291286492253038e-02
acc_w: 8.0363303593887979e-04
gyr_n: 2.6401761065710893e-03
gyr_w: 7.0304129470456934e-05
