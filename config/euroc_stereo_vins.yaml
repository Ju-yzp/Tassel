---
# EuRoC MAV stereo-inertial configuration (MH_01_easy)
# Camera model: pinhole + radial-tangential (from sensor.yaml)
# Extrinsics: T_BS (body=IMU -> sensor=camera) from sensor.yaml

cam0:
    camera_model: radtan
    T_cam_imu:
        - [0.0148655429818, -0.999880929698, 0.00414029679422, -0.0216401454975]
        - [0.999557249008, 0.0149672133247, 0.025715529948, -0.064676986768]
        - [-0.0257744366974, 0.00375618835797, 0.999660727178, 0.00981073058949]
        - [0.0, 0.0, 0.0, 1.0]
    distortion_coeffs: [-0.28340811, 0.07395907, 0.00019359, 1.76187114e-05]
    intrinsics:
        - [458.654, 0.0, 367.215]
        - [0.0, 457.296, 248.375]
        - [0.0, 0.0, 1.0]

cam1:
    camera_model: radtan
    T_cam_imu:
        - [0.0125552670891, -0.999755099723, 0.0182237714554, -0.0198435579556]
        - [0.999598781151, 0.0130119051815, 0.0251588363115, 0.0453689425024]
        - [-0.0253898008918, 0.0179005838253, 0.999517347078, 0.00786212447038]
        - [0.0, 0.0, 0.0, 1.0]
    distortion_coeffs: [-0.28368365, 0.07451284, -0.00010473, -3.55590700e-05]
    intrinsics:
        - [457.587, 0.0, 379.999]
        - [0.0, 456.134, 255.238]
        - [0.0, 0.0, 1.0]

rows: 480
cols: 752
per_grid_rows: 30
per_grid_cols: 47
edge_x: 20
edge_y: 20
mask_radius: 15.0
min_feature_num: 100

flow_back: true
max_square_move_dist: 0.6
min_gradient: 8.0
enable_statistics: false

reprojection_error_thres: 2.0
pnp_reprojection_error_thres: 0.01
parallax_thres: 30.0
max_pnp_needed_num: 25
tracked_times_thres: 3
min_pnp_num: 10
min_pnp_inliers_ratio: 0.50
min_depth: 0.3
max_depth: 5.0
min_translation: 0.05
min_tracked_pts_num: 90

use_imu: true
num_iterations: 10
max_frame_count: 10

initial_exposure_time_us: 10000

visual_factor_weight: 350.0

# VI initialization
estimate_ba_init: false
init_ba: [0.0, 0.0, 0.0]
min_rot_excitation: 0.07
min_excited_frames: 3
num_init_iterations: 2

# ADIS16448 IMU noise (from sensor.yaml)
acc_n: 0.002
acc_w: 0.003
gyr_n: 0.00016968
gyr_w: 0.000019393
g_norm: 9.81
