    intrinsics:
        - [457.587, 0.000000, 379.999]
        - [0.000000, 456.134, 255.238]
        - [0.0, 0.0, 1.0]

rows: 480
cols: 752
per_grid_rows: 30
per_grid_cols: 47
edge_x: 20
edge_y: 20
mask_radius: 15.0
min_feature_num: 100

flow_back: true
max_square_move_dist: 0.6
min_gradient: 8.0
enable_statistics: false

reprojection_error_thres: 2.0
parallax_thres: 25.0
max_pnp_needed_num: 25
tracked_times_thres: 3
min_pnp_num: 10
min_pnp_inliers_ratio: 0.85
min_depth: 0.3
max_depth: 20.0
min_translation: 0.05
min_tracked_pts_num: 90

use_imu: true
num_iterations: 10
max_frame_count: 10

initial_exposure_time_us: 10000

visual_factor_weight: 30.0

# ADIS16448 IMU noise (EuRoC)
acc_n: 0.08
acc_w: 0.0004
gyr_n: 0.004
gyr_w: 0.00002
g_norm: 9.81
