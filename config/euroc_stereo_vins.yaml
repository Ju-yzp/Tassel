---
# EuRoC MAV stereo-inertial configuration (MH_01_easy)
# Camera model: pinhole-equidistant (Kannala-Brandt)
# Default calibration values from MH_01 — adjust per sequence using sensor.yaml

cam0:
    camera_model: equi
    T_cam_imu:
        - [-0.999997256477881, 0.002312067192424, 0.000529659233075, 0.014865542981794]
        - [0.002312067192424, 0.999997256477881, 0.000529659233075, -0.000088220567491]
        - [-0.000529659233075, 0.000529659233075, -1.000000000000000, -0.007298411277974]
        - [0.0, 0.0, 0.0, 1.0]
    distortion_coeffs: [-0.28340811, 0.07395907, 0.0, 0.0]
    intrinsics:
        - [458.654, 0.000000, 367.215]
        - [0.000000, 457.296, 248.375]
        - [0.0, 0.0, 1.0]

cam1:
    camera_model: equi
    T_cam_imu:
        - [-0.999997256477881, 0.002312067192424, 0.000529659233075, -0.095134533922158]
        - [0.002312067192424, 0.999997256477881, 0.000529659233075, -0.000720120693126]
        - [-0.000529659233075, 0.000529659233075, -1.000000000000000, -0.007519880260635]
        - [0.0, 0.0, 0.0, 1.0]
