---
cam0:
    camera_model: radtan
    T_cam_imu:
        - [-0.00977443, 0.99994776, -0.00299082, 0.07059827]
        - [0.99994922, 0.00976703, -0.00248047, -0.00039139]
        - [-0.00245113, -0.00301491, -0.99999245, -0.00546604]
        - [0.0, 0.0, 0.0, 1.0]
    distortion_coeffs: [0.00769261, -0.05540635, -1.368e-05, 0.00080198]
    intrinsics:
        - [808.739536, 0.0, 615.788205]
        - [0.0, 806.137546, 344.852773]
        - [0.0, 0.0, 1.0]

cam1:
    camera_model: radtan
    T_cam_imu:
        - [-0.00205114, 0.99998305, -0.00544840, -0.00487269]
        - [0.99998103, 0.00201943, -0.00581922, -0.00069514]
        - [-0.00580812, -0.00546023, -0.99996823, -0.00537052]
        - [0.0, 0.0, 0.0, 1.0]
    distortion_coeffs: [0.00352322, -0.04856968, 9.228e-05, 0.00055914]
    intrinsics:
        - [811.349145, 0.0, 634.047312]
        - [0.0, 808.546599, 365.454054]
        - [0.0, 0.0, 1.0]

# 图像与特征跟踪
rows: 720
cols: 1280
per_grid_rows: 60
per_grid_cols: 80
edge_x: 80
edge_y: 50
mask_radius: 40.0
min_feature_num: 150

flow_back: true
max_square_move_dist: 0.5
min_gradient: 20.0
enable_statistics: true

# 特征与关键帧管理
reproj_err_thres: 1.4
reproj_huber_thres: 1.0
parallax_thres: 20.0
tracked_times_thres: 3
min_depth: 0.3
max_depth: 5.0
min_translation: 0.06
min_tracked_pts: 50
keyframe_new_feature_ratio: 0.25
keyframe_time_threshold: 1.5

# 滑窗优化
num_iterations: 16
max_frame_count: 10
visual_factor_weight: 400.0
num_threads: 1

# 时间延迟可观测性
delay_obs_gyro_threshold: 0.2
delay_obs_speed_threshold: 0.2
delay_obs_min_frames: 3

# IMU 模型与积分
integrator_type: midpoint
acc_n: 1.9291286492253038e-02
acc_w: 8.0363303593887979e-04
gyr_n: 2.6401761065710893e-03
gyr_w: 7.0304129470456934e-05
g_norm: 9.8035
acc_bias: [0.720, -0.022, -0.199]
imu_repropagate_ba_threshold: 0.02
imu_repropagate_bg_threshold: 0.002

# 视觉惯性初始化
num_init_iterations: 8
gravity_diff_threshold: 0.21
sfm_min_seed_pts: 10
sfm_min_e_inliers: 8
sfm_e_ransac_threshold: 0.004
sfm_min_pnp_pts: 10
sfm_pnp_reproj_threshold: 0.03
sfm_max_bad_pnp_ratio: 0.3
sfm_ba_max_iterations: 10
sfm_ba_num_threads: 5

# 可视化
viewer:
    path_max_poses: 300
