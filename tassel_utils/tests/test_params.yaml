# ── test parameters for ParamsParser unit tests ──────────────────────────

# scalar types
int_val: 42
double_val: 3.14159
bool_true: true
bool_false: false
string_val: hello_tassel
size_val: 100

# flat matrix (1-D sequence → Eigen maps to row vector or cv::Mat column)
